name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  mcp-server:
    name: obsidian-vault MCP (build + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp/obsidian-vault
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: mcp/obsidian-vault/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build and test
        run: npm test

  python-skills:
    name: Python skills (agent-eval + deid-reid-harness)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: agent-eval — unit-test the scorer (stdlib unittest)
        run: python skills/agent-eval/scripts/test_score_eval.py

      - name: agent-eval — score example results (smoke)
        run: python skills/agent-eval/scripts/score_eval.py skills/agent-eval/scripts/example_results.jsonl

      - name: agent-eval — verify the regression example trips the gate
        # Self-check: the worked example is designed to fail the gate. Confirm it
        # still does (exit non-zero), so the example can't silently bit-rot.
        run: |
          if python skills/agent-eval/scripts/score_eval.py skills/agent-eval/examples/results_regressed.jsonl \
               --baseline skills/agent-eval/examples/results_baseline.jsonl --fail-on-regression --fail-under 0.85; then
            echo "ERROR: regression example did not trip the gate"; exit 1
          else
            echo "OK: gate correctly caught the regression (exit non-zero)"
          fi

      - name: agent-redteam — score adversarial set with a CI gate
        # Demonstrates the DevSecOps pattern: the scorer exits non-zero if the
        # adversarial pass rate falls below the gate, failing the build.
        run: python skills/agent-redteam/scripts/score_eval.py skills/agent-redteam/examples/adversarial_results.jsonl --fail-under 0.5

      - name: deid-reid-harness — run test suite (stdlib unittest)
        run: python skills/deid-reid-harness/scripts/test_harness.py
